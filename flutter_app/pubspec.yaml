name: sabzevar_services
description: Smart Services Directory App for Sabzevar

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.5
  
  # HTTP Client
  dio: ^5.3.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.1.14
  share_plus: ^7.0.2
  geolocator: ^9.0.2
  
  # Permission
  permission_handler: ^11.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/json/
  
  fonts:
    - family: IranSans
      fonts:
        - asset: assets/fonts/IranSans.ttf
        - asset: assets/fonts/IranSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/IranSans-Medium.ttf
          weight: 500
